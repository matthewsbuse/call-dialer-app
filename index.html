<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Dialer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-carte">
      <div class="login-titre">Dialer</div>
      <div class="login-sous-titre">Connexion requise</div>
      <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Nom d'utilisateur" autocomplete="username" />
        <input type="password" id="loginMdp" placeholder="Mot de passe" autocomplete="current-password" />
        <div class="login-erreur" id="loginErreur">Identifiants incorrects</div>
        <button type="submit" class="btn-login">Connexion</button>
      </form>
    </div>
  </div>

  <!-- Popup post-appel -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-carte">
      <p class="popup-numero" id="popupNumero"></p>
      <p class="popup-question">Comment ça s'est passé ?</p>
      <div class="popup-boutons">
        <button class="btn-parle" id="btnParle">✅ J'ai parlé</button>
        <button class="btn-pas-repondu" id="btnPasRepondu">❌ Pas répondu</button>
      </div>
    </div>
  </div>

  <div class="conteneur">

    <div class="entete">
      <span class="titre">Dialer</span>
      <span class="caller-id" id="callerIdAffichage">—</span>
    </div>

    <div class="zone-statut">
      <div class="pastille" id="pastilleStatut"></div>
      <span id="texteStatut">Initialisation...</span>
    </div>

    <div class="zone-timer" id="zoneTimer">
      <span id="timer">00:00</span>
    </div>

    <div class="zone-numero">
      <input
        type="tel"
        id="champNumero"
        placeholder="418-xxx-xxxx"
        maxlength="12"
        autocomplete="tel"
        inputmode="tel"
      />
    </div>

    <div class="zone-boutons">
      <button id="btnDemarrer" class="btn-demarrer">🎙 Démarrer</button>
      <button id="btnAppeler" class="btn-appeler" disabled style="display:none">📞 Appeler</button>
      <button id="btnRaccrocher" class="btn-raccrocher" style="display:none">🔴 Raccrocher</button>
    </div>

    <!-- Tabs principales -->
    <div class="tabs-main">
      <button class="tab-main actif" data-tab="crm">🎯 CRM</button>
      <button class="tab-main" data-tab="historique">📋 Historique</button>
    </div>

    <!-- Panel CRM -->
    <div id="panelCRM" class="panel-main">
      <div class="crm-header">
        <span class="crm-progress" id="crmProgress">0 / 20 contactés</span>
        <div style="display:flex;gap:8px">
          <button class="btn-suivant" id="btnSuivant">Suivant →</button>
          <button class="btn-suivant" id="btnResetCRM" style="background:#c0392b;font-size:12px;padding:6px 10px">↺ Reset</button>
        </div>
      </div>
      <div class="crm-carte" id="crmCarte">
        <!-- contact actif injecté par JS -->
      </div>
      <div class="crm-liste" id="crmListe">
        <!-- tous les contacts -->
      </div>
    </div>

    <!-- Panel Historique -->
    <div id="panelHistorique" class="panel-main" style="display:none">
      <div class="onglets">
        <button class="onglet actif" data-tab="rappeler">❌ À rappeler</button>
        <button class="onglet" data-tab="parle">✅ Parlé</button>
      </div>
      <div class="liste-appels" id="listeRappeler"></div>
      <div class="liste-appels" id="listeParle" style="display:none"></div>
    </div>

  </div>

  <!-- Twilio Voice SDK v2 (UMD — expose global Twilio) -->
  <script src="/twilio.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
